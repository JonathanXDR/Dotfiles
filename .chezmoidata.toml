# Shared non-secret data for chezmoi templates.
# Values here are available as template variables (e.g. {{ .editor }}).

# Shell defaults
editor = "vi"
history_size = 32768
autostart_ssh_agent = false

# Display
default_hostname = "void(0)"
tree_ignore = ".git|node_modules|.DS_Store|dist|build|target|__pycache__|.venv|.next|.nuxt|.svelte-kit|.gradle|coverage"
dock_apps = ["Zen", "Notion", "Visual Studio Code", "Microsoft Teams", "Discord", "GitKraken"]

# Directory basenames that `rm` should permanently delete instead of trashing
trash_skip = ["node_modules"]

# Cisco VPN binary (used by vpn:* functions)
cisco_vpn_bin = "/opt/cisco/secureclient/bin/vpn"
